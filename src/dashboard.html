<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'none'; media-src 'self'; object-src 'none'; base-uri 'none'">
  <title>Panel de Control - Mascota Virtual</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body style="background: transparent; padding: 10px;">
  <div class="dashboard-card">
    
    <!-- Drag-friendly Header Titlebar -->
    <div class="title-bar">
      <div class="title-bar-title">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="color: var(--primary);">
          <path d="M12 2a10 10 0 1 0 10 10A10 10 0 0 0 12 2zm1 15h-2v-6h2zm0-8h-2V7h2z"/>
        </svg>
        <span>Mascota Asistente IA</span>
      </div>
      <button id="close-dashboard-btn" class="close-btn" title="Cerrar panel">&times;</button>
    </div>

    <!-- Main Content Area -->
    <div class="dashboard-content">
      
      <!-- Navigation Tabs -->
      <div class="tabs-header">
        <button class="tab-btn active" data-tab="pomodoro">Pomodoro</button>
        <button class="tab-btn" data-tab="chat">Chatear</button>
        <button class="tab-btn" data-tab="settings">Ajustes</button>
      </div>

      <!-- TAB 1: POMODORO TIMER -->
      <div class="tab-panel active" id="tab-pomodoro">
        <div class="pomodoro-container">
          <div class="timer-circle-wrap">
            <svg class="timer-svg" viewBox="0 0 180 180">
              <circle class="timer-bg-circle" cx="90" cy="90" r="80"></circle>
              <circle id="timer-progress" class="timer-progress-circle" cx="90" cy="90" r="80"></circle>
            </svg>
            <div class="timer-text-container">
              <div id="timer-time" class="timer-time">25:00</div>
              <div id="timer-status" class="timer-label">Trabajo</div>
            </div>
          </div>

          <div class="timer-controls">
            <button id="timer-toggle-btn" class="btn btn-primary">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
              <span>Iniciar</span>
            </button>
            <button id="timer-reset-btn" class="btn btn-secondary">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.57-8.38l5.67-5.67"></path></svg>
              <span>Reiniciar</span>
            </button>
          </div>
        </div>
      </div>

      <!-- TAB 2: AI CHAT ASSISTANT -->
      <div class="tab-panel" id="tab-chat">
        <div class="chat-container">
          <div class="chat-companion-header">
            <div id="chat-pet-avatar" class="chat-pet-avatar">🐾</div>
            <div class="chat-companion-copy">
              <strong id="chat-pet-name">Luna</strong>
              <span id="chat-pet-status"><i></i> Lista para acompañarte</span>
            </div>
          </div>
          <div id="chat-history" class="chat-history">
            <div class="chat-bubble assistant">¡Hola! Escribe algo y con gusto te respondo. Miau/Guau.</div>
          </div>
          <div class="quick-prompts" aria-label="Mensajes sugeridos">
            <button type="button" data-prompt="Ayúdame a enfocarme en mi siguiente tarea">Enfocarme</button>
            <button type="button" data-prompt="Anímame, terminé una tarea importante">Celebrar logro</button>
            <button type="button" data-prompt="Recuérdame tomar un descanso corto">Pausa breve</button>
          </div>
          <div class="chat-input-area">
            <input type="text" id="chat-input" class="chat-input" placeholder="Pregúntale a tu mascota..." autocomplete="off">
            <button id="chat-send-btn" class="send-btn">
              <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
            </button>
          </div>
        </div>
      </div>

      <!-- TAB 3: SETTINGS -->
      <div class="tab-panel" id="tab-settings">
        <div class="settings-section">
          
          <div class="settings-group">
            <label class="settings-label">Elige tu mascota</label>
            <div class="mascot-selector">
              <div class="mascot-card active" data-pet="cat">
                <div class="mascot-preview-svg" id="cat-preview"></div>
                <div class="mascot-card-name">Luna (Gatito)</div>
                <div class="mascot-card-desc">Tranquila, sabia y relajante.</div>
              </div>
              <div class="mascot-card" data-pet="dog">
                <div class="mascot-preview-svg" id="dog-preview"></div>
                <div class="mascot-card-name">Max (Perrito)</div>
                <div class="mascot-card-desc">Alegre, enérgico y motivador.</div>
              </div>
            </div>
          </div>

          <div class="settings-group">
            <label class="settings-label" for="api-key-input">MiniMax API Key</label>
            <input type="password" id="api-key-input" class="settings-input" placeholder="Pega una nueva API Key" autocomplete="off">
            <p id="api-key-status" class="api-key-status">Consultando almacenamiento seguro...</p>
            <button id="clear-api-key-btn" class="btn btn-danger btn-compact" type="button" hidden>Eliminar clave guardada</button>
          </div>

          <div class="settings-group sound-setting-row">
            <div>
              <label class="settings-label" for="sound-enabled-input">Sonidos de la mascota</label>
              <span>Maullidos, ronroneos y ladridos suaves.</span>
            </div>
            <label class="switch-control">
              <input id="sound-enabled-input" type="checkbox" checked>
              <span></span>
            </label>
          </div>

          <div class="settings-group" style="margin-top: 10px;">
            <button id="save-settings-btn" class="btn btn-primary" style="width: 100%;">Guardar Ajustes</button>
          </div>

        </div>
      </div>

    </div>
  </div>

  <!-- Scripts -->
  <script src="assets/cat.js"></script>
  <script src="assets/dog.js"></script>
  <script src="dashboard-renderer.js"></script>
</body>
</html>
